<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦕 Dinosaur Quiz — Paris Natural History Museum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #141210;
      --surface: #1e1b18;
      --card: #252119;
      --border: #3d3830;
      --amber: #e8a020;
      --amber-light: #f5c842;
      --cream: #f5efe4;
      --muted: #9e9488;
      --green: #3dba6e;
      --green-bg: rgba(61, 186, 110, 0.12);
      --red: #e84040;
      --red-bg: rgba(232, 64, 64, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 40px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(232,160,32,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(61,186,110,0.03) 0%, transparent 50%);
    }

    #app {
      width: 100%;
      max-width: 600px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── LANGUAGE TOGGLE ── */
    .lang-row {
      display: flex;
      justify-content: flex-end;
      padding: 4px 0 0;
      gap: 6px;
    }
    .lang-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 5px 13px;
      border-radius: 99px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .lang-btn:hover { color: var(--cream); border-color: var(--muted); }
    .lang-btn.active {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(232, 160, 32, 0.08);
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      padding: 32px 0 28px;
    }
    .site-header .emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .site-header h1 {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      color: var(--amber-light);
      letter-spacing: 0.04em;
      line-height: 1.2;
    }
    .site-header .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── START CARD ── */
    .start-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
    }
    .start-card p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .pill-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0 28px;
    }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: var(--amber);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      color: #141210;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary.hidden { display: none; }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--amber);
      border: 1px solid var(--amber);
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 12px 30px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(232,160,32,0.08); }

    /* ── PROGRESS ── */
    .progress-wrapper {
      margin-bottom: 18px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .progress-bar {
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--amber-light));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }
    .question-card.correct { border-color: var(--green); }
    .question-card.wrong { border-color: var(--red); }

    .image-wrapper {
      position: relative;
      padding-top: 55%;
      background: #0a0908;
      overflow: hidden;
    }
    .image-wrapper img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s;
    }
    .image-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .image-fallback.visible { opacity: 1; }

    .card-body {
      padding: 24px;
    }
    .question-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }
    .question-text {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3vw, 1.18rem);
      line-height: 1.5;
      color: var(--cream);
      margin-bottom: 20px;
    }

    /* ── ANSWERS ── */
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 420px) {
      .answers-grid { grid-template-columns: 1fr; }
    }

    .answer-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      cursor: pointer;
      text-align: left;
      color: var(--cream);
      font-family: 'Open Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .answer-btn:not(:disabled):hover {
      border-color: var(--amber);
      background: rgba(232,160,32,0.07);
      transform: translateY(-1px);
    }
    .answer-btn:disabled { cursor: default; }

    .answer-letter {
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    .answer-btn.selected .answer-letter { background: var(--amber); color: #141210; }
    .answer-btn.correct-ans {
      border-color: var(--green);
      background: var(--green-bg);
    }
    .answer-btn.correct-ans .answer-letter { background: var(--green); color: #fff; }
    .answer-btn.wrong-ans {
      border-color: var(--red);
      background: var(--red-bg);
    }
    .answer-btn.wrong-ans .answer-letter { background: var(--red); color: #fff; }

    /* ── FACT BOX ── */
    .fact-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--surface);
      border-left: 3px solid var(--amber);
      border-radius: 0 10px 10px 0;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--muted);
    }
    .fact-box strong { color: var(--amber-light); }
    .fact-box.visible { display: block; }

    /* ── NEXT BUTTON ROW ── */
    .next-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    /* ── RESULT SCREEN ── */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .score-ring {
      width: 140px;
      height: 140px;
      margin: 0 auto 24px;
      position: relative;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-track { fill: none; stroke: var(--border); stroke-width: 10; }
    .score-ring-fill {
      fill: none;
      stroke: url(#scoreGrad);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
    }
    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-number {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--amber-light);
      line-height: 1;
    }
    .score-denom { font-size: 1rem; color: var(--muted); margin-top: 2px; }

    .result-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 12px;
    }
    .result-message {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .result-actions { display: flex; flex-direction: column; align-items: center; gap: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ LANGUAGE TOGGLE ═══ -->
  <div class="lang-row">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">RU</button>
  </div>

  <!-- ═══ START SCREEN ═══ -->
  <div id="start-screen" class="screen active">
    <div class="site-header">
      <span class="emoji">🦕</span>
      <h1 id="start-title">Dinosaur Quiz</h1>
      <p class="subtitle" id="start-subtitle">Muséum National d'Histoire Naturelle · Paris</p>
    </div>
    <div class="start-card">
      <p id="start-intro">How much do you know about the prehistoric giants that ruled our planet for over 160 million years?</p>
      <div class="pill-row">
        <span class="pill" id="pill1">🦴 10 Questions</span>
        <span class="pill" id="pill2">🏛️ Museum Edition</span>
        <span class="pill" id="pill3">🌍 Jurassic & Beyond</span>
      </div>
      <button class="btn-primary" id="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>
  </div>

  <!-- ═══ QUESTION SCREEN ═══ -->
  <div id="question-screen" class="screen">
    <div class="site-header" style="padding: 20px 0 16px;">
      <h1 id="quiz-title" style="font-size:1.3rem;">🦕 Dinosaur Quiz</h1>
    </div>

    <div class="progress-wrapper">
      <div class="progress-meta">
        <span id="q-label">Question 1 of 10</span>
        <span id="q-score">Score: 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="image-wrapper">
        <img id="dino-img" src="" alt="" onerror="this.style.opacity=0;this.nextElementSibling.classList.add('visible')">
        <div class="image-fallback" id="img-fallback"></div>
      </div>
      <div class="card-body">
        <div class="question-label" id="dino-name"></div>
        <div class="question-text" id="question-text"></div>
        <div class="answers-grid" id="answers-grid"></div>
        <div class="fact-box" id="fact-box"></div>
      </div>
    </div>

    <div class="next-row">
      <button class="btn-primary hidden" id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <!-- ═══ RESULT SCREEN ═══ -->
  <div id="result-screen" class="screen">
    <div class="site-header">
      <span class="emoji">🏆</span>
      <h1 id="result-screen-title">Quiz Complete!</h1>
    </div>
    <div class="result-card">
      <div class="score-ring">
        <svg viewBox="0 0 140 140" width="140" height="140">
          <defs>
            <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#e8a020"/>
              <stop offset="100%" style="stop-color:#f5c842"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-track" cx="70" cy="70" r="60"/>
          <circle class="score-ring-fill" id="score-ring-fill" cx="70" cy="70" r="60"
            stroke-dasharray="377" stroke-dashoffset="377"/>
        </svg>
        <div class="score-center">
          <div class="score-number" id="final-score">0</div>
          <div class="score-denom">/ 10</div>
        </div>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-message" id="result-message"></div>
      <div class="result-actions">
        <button class="btn-primary" id="play-again-btn" onclick="restartQuiz()">Play Again 🔁</button>
        <button class="btn-secondary" id="share-btn" onclick="shareResult()">Share Result 📤</button>
      </div>
    </div>
  </div>

</div>

<script>
const LETTERS = ['A', 'B', 'C', 'D'];
let currentLang = 'en';
let currentIndex = 0;
let score = 0;
let answered = false;

/* ── HELPERS ── */
function tx() { return i18n[currentLang]; }
function qs() { return questions[currentLang]; }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── LANGUAGE SWITCH ── */
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
  updateStaticText();
  const activeId = document.querySelector('.screen.active')?.id;
  if (activeId === 'question-screen') renderQuestion();
  if (activeId === 'result-screen') renderResultText();
}

function updateStaticText() {
  const t = tx();
  document.getElementById('start-title').textContent = t.title;
  document.getElementById('start-subtitle').textContent = t.subtitle;
  document.getElementById('start-intro').textContent = t.intro;
  document.getElementById('pill1').textContent = t.pill1;
  document.getElementById('pill2').textContent = t.pill2;
  document.getElementById('pill3').textContent = t.pill3;
  document.getElementById('start-btn').textContent = t.startBtn;
  document.getElementById('quiz-title').textContent = '🦕 ' + t.title;
  document.getElementById('result-screen-title').textContent = t.resultTitle;
  document.getElementById('play-again-btn').textContent = t.playAgain;
  document.getElementById('share-btn').textContent = t.share;
}

/* ── QUIZ LOGIC ── */
function startQuiz() {
  currentIndex = 0;
  score = 0;
  answered = false;
  show('question-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = qs()[currentIndex];
  const t = tx();
  answered = false;

  document.getElementById('q-label').textContent = t.questionOf(currentIndex + 1, qs().length);
  document.getElementById('q-score').textContent = t.scoreLabel(score);
  document.getElementById('progress-fill').style.width = `${(currentIndex / qs().length) * 100}%`;

  document.getElementById('dino-name').textContent = q.dino;
  document.getElementById('question-text').textContent = q.question;

  const img = document.getElementById('dino-img');
  const fallback = document.getElementById('img-fallback');
  img.style.opacity = '1';
  fallback.classList.remove('visible');
  fallback.textContent = q.fallback;
  img.src = q.image;
  img.alt = q.dino;

  document.getElementById('question-card').className = 'question-card';
  const factBox = document.getElementById('fact-box');
  factBox.className = 'fact-box';
  factBox.innerHTML = '';

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-letter">${LETTERS[i]}</span>${ans}`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('next-btn').classList.add('hidden');
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = qs()[currentIndex];
  const t = tx();
  const buttons = document.querySelectorAll('.answer-btn');
  const card = document.getElementById('question-card');

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct-ans');
    if (i === index && i !== q.correct) btn.classList.add('wrong-ans');
  });

  if (index === q.correct) {
    score++;
    card.classList.add('correct');
  } else {
    card.classList.add('wrong');
  }

  document.getElementById('q-score').textContent = t.scoreLabel(score);

  const factBox = document.getElementById('fact-box');
  factBox.innerHTML = `🦴 <strong>${t.didYouKnow}</strong> ${q.fact}`;
  factBox.classList.add('visible');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentIndex < qs().length - 1 ? t.nextBtn : t.seeResults;
  nextBtn.classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= qs().length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  show('result-screen');
  document.getElementById('final-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';

  const circumference = 2 * Math.PI * 60;
  const offset = circumference * (1 - score / qs().length);
  const ring = document.getElementById('score-ring-fill');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

  renderResultText();
}

function renderResultText() {
  const t = tx();
  document.getElementById('result-screen-title').textContent = t.resultTitle;
  const result = t.results.find(m => score >= m.min);
  document.getElementById('result-title').textContent = result.title;
  document.getElementById('result-message').textContent = result.msg;
  document.getElementById('play-again-btn').textContent = t.playAgain;
  document.getElementById('share-btn').textContent = t.share;
}

function restartQuiz() {
  startQuiz();
}

function shareResult() {
  const t = tx();
  const text = t.shareText(score, location.href);
  if (navigator.share) {
    navigator.share({ title: tx().title, text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert(t.clipboardMsg));
  }
}

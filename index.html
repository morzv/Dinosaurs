<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦕 Dinosaur Quiz — Paris Natural History Museum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #141210;
      --surface: #1e1b18;
      --card: #252119;
      --border: #3d3830;
      --amber: #e8a020;
      --amber-light: #f5c842;
      --cream: #f5efe4;
      --muted: #9e9488;
      --green: #3dba6e;
      --green-bg: rgba(61, 186, 110, 0.12);
      --red: #e84040;
      --red-bg: rgba(232, 64, 64, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 40px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(232,160,32,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(61,186,110,0.03) 0%, transparent 50%);
    }

    #app {
      width: 100%;
      max-width: 600px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      padding: 32px 0 28px;
    }
    .site-header .emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .site-header h1 {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      color: var(--amber-light);
      letter-spacing: 0.04em;
      line-height: 1.2;
    }
    .site-header .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── START CARD ── */
    .start-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
    }
    .start-card p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .pill-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0 28px;
    }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: var(--amber);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      color: #141210;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary.hidden { display: none; }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--amber);
      border: 1px solid var(--amber);
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 12px 30px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(232,160,32,0.08); }

    /* ── PROGRESS ── */
    .progress-wrapper {
      margin-bottom: 18px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .progress-bar {
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--amber-light));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }
    .question-card.correct { border-color: var(--green); }
    .question-card.wrong { border-color: var(--red); }

    .image-wrapper {
      position: relative;
      padding-top: 55%;
      background: #0a0908;
      overflow: hidden;
    }
    .image-wrapper img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s;
    }
    .image-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .image-fallback.visible { opacity: 1; }

    .card-body {
      padding: 24px;
    }
    .question-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }
    .question-text {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3vw, 1.18rem);
      line-height: 1.5;
      color: var(--cream);
      margin-bottom: 20px;
    }

    /* ── ANSWERS ── */
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 420px) {
      .answers-grid { grid-template-columns: 1fr; }
    }

    .answer-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      cursor: pointer;
      text-align: left;
      color: var(--cream);
      font-family: 'Open Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .answer-btn:not(:disabled):hover {
      border-color: var(--amber);
      background: rgba(232,160,32,0.07);
      transform: translateY(-1px);
    }
    .answer-btn:disabled { cursor: default; }

    .answer-letter {
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    .answer-btn.selected .answer-letter { background: var(--amber); color: #141210; }
    .answer-btn.correct-ans {
      border-color: var(--green);
      background: var(--green-bg);
    }
    .answer-btn.correct-ans .answer-letter { background: var(--green); color: #fff; }
    .answer-btn.wrong-ans {
      border-color: var(--red);
      background: var(--red-bg);
    }
    .answer-btn.wrong-ans .answer-letter { background: var(--red); color: #fff; }

    /* ── FACT BOX ── */
    .fact-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--surface);
      border-left: 3px solid var(--amber);
      border-radius: 0 10px 10px 0;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--muted);
    }
    .fact-box strong { color: var(--amber-light); }
    .fact-box.visible { display: block; }

    /* ── NEXT BUTTON ROW ── */
    .next-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    /* ── RESULT SCREEN ── */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .score-ring {
      width: 140px;
      height: 140px;
      margin: 0 auto 24px;
      position: relative;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-track { fill: none; stroke: var(--border); stroke-width: 10; }
    .score-ring-fill {
      fill: none;
      stroke: url(#scoreGrad);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
    }
    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-number {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--amber-light);
      line-height: 1;
    }
    .score-denom { font-size: 1rem; color: var(--muted); margin-top: 2px; }

    .result-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 12px;
    }
    .result-message {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .result-actions { display: flex; flex-direction: column; align-items: center; gap: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ START SCREEN ═══ -->
  <div id="start-screen" class="screen active">
    <div class="site-header">
      <span class="emoji">🦕</span>
      <h1>Dinosaur Quiz</h1>
      <p class="subtitle">Muséum National d'Histoire Naturelle · Paris</p>
    </div>
    <div class="start-card">
      <p>How much do you know about the prehistoric giants that ruled our planet for over 160 million years?</p>
      <div class="pill-row">
        <span class="pill">🦴 10 Questions</span>
        <span class="pill">🏛️ Museum Edition</span>
        <span class="pill">🌍 Jurassic & Beyond</span>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
    </div>
  </div>

  <!-- ═══ QUESTION SCREEN ═══ -->
  <div id="question-screen" class="screen">
    <div class="site-header" style="padding: 20px 0 16px;">
      <h1 style="font-size:1.3rem;">🦕 Dinosaur Quiz</h1>
    </div>

    <div class="progress-wrapper">
      <div class="progress-meta">
        <span id="q-label">Question 1 of 10</span>
        <span id="q-score">Score: 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="image-wrapper">
        <img id="dino-img" src="" alt="" onerror="this.style.opacity=0;this.nextElementSibling.classList.add('visible')">
        <div class="image-fallback" id="img-fallback"></div>
      </div>
      <div class="card-body">
        <div class="question-label" id="dino-name"></div>
        <div class="question-text" id="question-text"></div>
        <div class="answers-grid" id="answers-grid"></div>
        <div class="fact-box" id="fact-box"></div>
      </div>
    </div>

    <div class="next-row">
      <button class="btn-primary hidden" id="next-btn" onclick="nextQuestion()">
        Next →
      </button>
    </div>
  </div>

  <!-- ═══ RESULT SCREEN ═══ -->
  <div id="result-screen" class="screen">
    <div class="site-header">
      <span class="emoji">🏆</span>
      <h1>Quiz Complete!</h1>
    </div>
    <div class="result-card">
      <div class="score-ring">
        <svg viewBox="0 0 140 140" width="140" height="140">
          <defs>
            <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#e8a020"/>
              <stop offset="100%" style="stop-color:#f5c842"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-track" cx="70" cy="70" r="60"/>
          <circle class="score-ring-fill" id="score-ring-fill" cx="70" cy="70" r="60"
            stroke-dasharray="377" stroke-dashoffset="377"/>
        </svg>
        <div class="score-center">
          <div class="score-number" id="final-score">0</div>
          <div class="score-denom">/ 10</div>
        </div>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-message" id="result-message"></div>
      <div class="result-actions">
        <button class="btn-primary" onclick="restartQuiz()">Play Again 🔁</button>
        <button class="btn-secondary" onclick="shareResult()">Share Result 📤</button>
      </div>
    </div>
  </div>

</div>

<script>
const LETTERS = ['A', 'B', 'C', 'D'];

const questions = [
  {
    dino: "Tyrannosaurus Rex",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Sue_Tyrannosaurus_Rex_at_the_Field_Museum.jpg/600px-Sue_Tyrannosaurus_Rex_at_the_Field_Museum.jpg",
    fallback: "🦖",
    question: "What does the name 'Tyrannosaurus Rex' mean?",
    answers: ["Tyrant lizard king", "Giant thunder beast", "Ancient fierce hunter", "King of all reptiles"],
    correct: 0,
    fact: "<strong>Tyranno</strong> = tyrant, <strong>saurus</strong> = lizard (Greek), <strong>rex</strong> = king (Latin). The full name means <em>Tyrant Lizard King</em> — a fitting title for one of the largest land predators ever."
  },
  {
    dino: "Triceratops",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Triceratops_loodusmuuseum.jpg/600px-Triceratops_loodusmuuseum.jpg",
    fallback: "🦕",
    question: "How many horns does a Triceratops have?",
    answers: ["1", "2", "3", "4"],
    correct: 2,
    fact: "<strong>Three horns</strong> — two long brow horns (up to 1 metre each!) and one shorter nose horn. The name literally means <em>three-horned face</em> in Greek."
  },
  {
    dino: "Stegosaurus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/FMNH_Stegosaurus.jpg/600px-FMNH_Stegosaurus.jpg",
    fallback: "🦕",
    question: "During which geological period did Stegosaurus live?",
    answers: ["Triassic (252–201 Ma)", "Jurassic (201–145 Ma)", "Cretaceous (145–66 Ma)", "Permian (299–252 Ma)"],
    correct: 1,
    fact: "Stegosaurus lived in the <strong>Late Jurassic</strong>, around 155–150 million years ago — the same period as Brachiosaurus and Allosaurus. Its large back plates may have been used for temperature regulation or display."
  },
  {
    dino: "Velociraptor",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Velociraptor_skeleton_white_background.jpg/600px-Velociraptor_skeleton_white_background.jpg",
    fallback: "🦖",
    question: "How big was a real Velociraptor?",
    answers: ["About the size of a horse", "About 2 metres tall", "About the size of a turkey", "About 5 metres long"],
    correct: 2,
    fact: "Real Velociraptors were only <strong>about the size of a turkey</strong> — roughly 60 cm tall! The Hollywood version from Jurassic Park was based on Deinonychus. Real raptors were also covered in feathers."
  },
  {
    dino: "Brachiosaurus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Giraffatitan_brancai_3.jpg/600px-Giraffatitan_brancai_3.jpg",
    fallback: "🦕",
    question: "What did Brachiosaurus mainly eat?",
    answers: ["Fish and aquatic creatures", "Other dinosaurs and carrion", "Leaves from tall treetops", "Roots and underground fungi"],
    correct: 2,
    fact: "Brachiosaurus was an <strong>herbivore</strong> that used its incredibly long neck to reach leaves at the tops of trees — like a giant giraffe. It could browse at heights of up to 13 metres."
  },
  {
    dino: "Diplodocus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Diplodocus_at_the_Smithsonian_Museum.jpg/600px-Diplodocus_at_the_Smithsonian_Museum.jpg",
    fallback: "🦕",
    question: "How long could Diplodocus grow?",
    answers: ["Up to 15 metres", "Up to 20 metres", "Up to 27 metres", "Up to 40 metres"],
    correct: 2,
    fact: "Diplodocus could reach <strong>up to 27 metres</strong> long, making it one of the longest dinosaurs ever discovered. Much of that length was its whip-like tail, which it may have cracked like a bullwhip!"
  },
  {
    dino: "Ankylosaurus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Schwanzkeule_von_Ankylosaurus.JPG/600px-Schwanzkeule_von_Ankylosaurus.JPG",
    fallback: "🦕",
    question: "What weapon did Ankylosaurus have at the end of its tail?",
    answers: ["Sharp bone spikes", "A massive bony club", "Venomous barbs", "A razor-sharp blade"],
    correct: 1,
    fact: "Ankylosaurus had a <strong>massive bony club</strong> at the end of its tail, made of fused bone. Scientists estimate it could swing with enough force to break the leg bones of a T. rex!"
  },
  {
    dino: "Spinosaurus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Spinosaurus_at_the_National_Geographic_Museum_in_DC.jpg/600px-Spinosaurus_at_the_National_Geographic_Museum_in_DC.jpg",
    fallback: "🦖",
    question: "What makes Spinosaurus unique among large predatory dinosaurs?",
    answers: ["It could fly short distances", "It only ate plants", "It was semi-aquatic and hunted fish", "It had the largest brain"],
    correct: 2,
    fact: "Spinosaurus is believed to have been <strong>semi-aquatic</strong> — short, dense legs, dense bones for buoyancy, and crocodile-like jaws suggest it hunted fish in rivers. It may also have been the <em>longest</em> predatory dinosaur at over 14 metres."
  },
  {
    dino: "Parasaurolophus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/FMNH_Parasaurolophus.jpg/600px-FMNH_Parasaurolophus.jpg",
    fallback: "🦕",
    question: "What was the large hollow crest on Parasaurolophus's head likely used for?",
    answers: ["Charging at predators", "Making loud calls to communicate", "Storing extra water", "Detecting smells from far away"],
    correct: 1,
    fact: "The hollow crest acted like a <strong>musical instrument</strong> — air resonating through its internal tubes could produce deep, trombone-like calls for communicating with the herd and attracting mates."
  },
  {
    dino: "Pterodactylus",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Fossil_of_Pterodactylus_antiquus_from_Solnhofen.jpg/600px-Fossil_of_Pterodactylus_antiquus_from_Solnhofen.jpg",
    fallback: "🐉",
    question: "Were Pterodactyls (pterosaurs) actually dinosaurs?",
    answers: [
      "Yes — they were flying dinosaurs",
      "No — they were a separate group of flying reptiles",
      "Yes — they evolved from birds",
      "No — they were ancient mammals"
    ],
    correct: 1,
    fact: "Pterosaurs were <strong>not dinosaurs</strong> — they were a separate, closely related group of flying reptiles. True dinosaurs, by definition, are land animals. Pterosaurs were the first vertebrates to achieve powered flight, over 228 million years ago."
  }
];

let currentIndex = 0;
let score = 0;
let answered = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  currentIndex = 0;
  score = 0;
  answered = false;
  show('question-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIndex];
  answered = false;

  document.getElementById('q-label').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
  document.getElementById('q-score').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(currentIndex / questions.length) * 100}%`;

  document.getElementById('dino-name').textContent = q.dino;
  document.getElementById('question-text').textContent = q.question;

  const img = document.getElementById('dino-img');
  const fallback = document.getElementById('img-fallback');
  img.style.opacity = '1';
  fallback.classList.remove('visible');
  fallback.textContent = q.fallback;
  img.src = q.image;
  img.alt = q.dino;

  const card = document.getElementById('question-card');
  card.className = 'question-card';

  const factBox = document.getElementById('fact-box');
  factBox.className = 'fact-box';
  factBox.innerHTML = '';

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-letter">${LETTERS[i]}</span>${ans}`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('next-btn').classList.add('hidden');
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const buttons = document.querySelectorAll('.answer-btn');
  const card = document.getElementById('question-card');

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct-ans');
    if (i === index && i !== q.correct) btn.classList.add('wrong-ans');
  });

  if (index === q.correct) {
    score++;
    card.classList.add('correct');
  } else {
    card.classList.add('wrong');
  }

  document.getElementById('q-score').textContent = `Score: ${score}`;

  const factBox = document.getElementById('fact-box');
  factBox.innerHTML = `🦴 <strong>Did you know?</strong> ${q.fact}`;
  factBox.classList.add('visible');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentIndex < questions.length - 1 ? 'Next →' : 'See Results 🏆';
  nextBtn.classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  show('result-screen');

  document.getElementById('final-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';

  const circumference = 2 * Math.PI * 60;
  const offset = circumference * (1 - score / questions.length);
  const ring = document.getElementById('score-ring-fill');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

  const messages = [
    { min: 9, title: "Palaeontologist! 🏅", msg: "Extraordinary! You know dinosaurs better than most experts. The museum curators would be impressed!" },
    { min: 7, title: "Dino Enthusiast! 🌟", msg: "Excellent work! You clearly have a passion for prehistoric life. A few more visits and you'll be the expert!" },
    { min: 5, title: "Fossil Hunter 🔍", msg: "Good job! You know your way around the Cretaceous. A walk through the museum will fill in the rest!" },
    { min: 3, title: "Curious Explorer 🗺️", msg: "Not bad for a start! The prehistoric world has many more secrets to reveal — enjoy the museum!" },
    { min: 0, title: "Budding Discoverer 🥚", msg: "Every palaeontologist starts somewhere! Take this quiz again after your museum tour — you'll be amazed how much you learn." }
  ];

  const result = messages.find(m => score >= m.min);
  document.getElementById('result-title').textContent = result.title;
  document.getElementById('result-message').textContent = result.msg;
}

function restartQuiz() {
  startQuiz();
}

function shareResult() {
  const text = `🦕 I scored ${score}/10 on the Dinosaur Quiz! Can you beat me? Try it at ${location.href}`;
  if (navigator.share) {
    navigator.share({ title: 'Dinosaur Quiz', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Result copied to clipboard!'));
  }
}
</script>
